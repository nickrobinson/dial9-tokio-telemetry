name: "Rust builds"
description: "Builds and tests rust code"
inputs:
    toolchain:
        required: true
        description: "the Rust toolchain to use"
    save-if:
        required: false
        description: "whether to save the cache (e.g. only on main)"
        default: "true"

runs:
    using: "composite"
    steps:
        - name: Free up disk space
          if: runner.os == 'Linux'
          shell: bash
          run: |
              # `cargo test --all-targets --all-features` with frame pointers +
              # debug info produces enough artifacts to exhaust the ~14 GB free
              # on GitHub-hosted Linux runners (rustc-LLVM ERROR: No space left
              # on device). Reclaim ~30 GB of preinstalled toolchains we never
              # use before the toolchain install and cache restore run.
              echo "Disk before cleanup:"
              df -h /
              sudo rm -rf \
                  /usr/share/dotnet \
                  /usr/local/lib/android \
                  /opt/ghc \
                  /usr/local/.ghcup \
                  /opt/hostedtoolcache/CodeQL
              sudo docker image prune --all --force || true
              echo "Disk after cleanup:"
              df -h /
        - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
          with:
              toolchain: ${{ inputs.toolchain }}
        - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
          with:
              save-if: ${{ inputs.save-if }}
              cache-bin: "false"
        - name: Enable perf_event_open and kallsyms for tests
          if: runner.os == 'Linux'
          shell: bash
          run: |
              sudo sysctl kernel.perf_event_paranoid=1
              sudo sysctl kernel.kptr_restrict=0
        - name: Build and test
          shell: bash
          env:
              RUSTFLAGS: "--cfg tokio_unstable -C force-frame-pointers=yes"
          run: |
              if [ "${{ inputs.toolchain }}" = nightly ]; then
                  rm -fv Cargo.lock
              fi
              # tokio's `taskdump` feature only compiles on linux aarch64/x86/x86_64.
              # On macOS drop it from --all-features; leave everything else intact.
              if [ "$RUNNER_OS" = "Linux" ]; then
                  # Raise locked-memory limit for large perf ring buffers
                  sudo prlimit --pid $$ --memlock=unlimited:unlimited
                  cargo test --all-targets --all-features
              else
                  cargo test --all-targets --features __nonlinux_all_features
              fi
