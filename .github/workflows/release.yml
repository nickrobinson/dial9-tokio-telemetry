name: Publish release

permissions:
  pull-requests: write
  contents: write
  id-token: write

# Single, parameterized publish workflow. It always runs from `main` (so the
# release logic has one source of truth and can't drift per release branch) and
# releases whichever branch is passed in `release_branch`. The input is
# required with no default, so publishing is always a deliberate choice of
# branch (e.g. `main` or `release-0.3.x`).
#
# NOTE: because every run is dispatched against `main`, the `release`
# environment's branch policy can no longer distinguish which branch is being
# released — the "only main or release-* may publish" control lives in the
# `validate-branch` job below. The `dial9-maintainers` approval on the `release`
# environment still gates every publish regardless of input.
on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Branch to release (main or a release-* branch)"
        required: true
        type: string

jobs:
  validate-branch:
    name: Validate release branch
    runs-on: ubuntu-latest
    steps:
      - name: Ensure input is a releasable branch
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: |
          case "$RELEASE_BRANCH" in
            main | release-*)
              echo "Releasing from '$RELEASE_BRANCH'." ;;
            *)
              echo "Refusing to release: '$RELEASE_BRANCH' is not 'main' or a 'release-*' branch." >&2
              exit 1 ;;
          esac

  release-plz-release:
    name: Release-plz release
    needs: validate-branch
    runs-on: ubuntu-latest
    environment: release
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      releases_created: ${{ steps.release-plz.outputs.releases_created }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
        id: auth
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@7419a2cb1535b9c0e852b4dec626967baf65c022 # v0.5.102
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-viewer-binaries:
    name: Build dial9-viewer ${{ matrix.target }}
    needs: release-plz-release
    if: >-
      needs.release-plz-release.outputs.releases_created == 'true' &&
      contains(needs.release-plz-release.outputs.releases, '"package_name":"dial9-viewer"')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_branch }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }} -p dial9-viewer -p dial9
        env:
          RUSTFLAGS: "--cfg tokio_unstable"

      - name: Determine tag and version
        id: version
        shell: bash
        run: |
          TAG=$(echo '${{ needs.release-plz-release.outputs.releases }}' | jq -r '.[] | select(.package_name == "dial9-viewer") | .tag')
          VERSION=$(echo '${{ needs.release-plz-release.outputs.releases }}' | jq -r '.[] | select(.package_name == "dial9-viewer") | .version')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../dial9-viewer-${{ matrix.target }}-${{ steps.version.outputs.version }}.tar.gz dial9-viewer dial9

      - name: Package (Windows)
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path dial9-viewer.exe,dial9.exe -DestinationPath ../../../dial9-viewer-${{ matrix.target }}-${{ steps.version.outputs.version }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dial9-viewer-${{ matrix.target }}-${{ steps.version.outputs.version }}.${{ matrix.archive }}
