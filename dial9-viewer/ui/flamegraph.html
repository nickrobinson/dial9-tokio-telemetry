<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flamegraph</title>
        <link rel="stylesheet" href="flamegraph.css" />
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                background: #1a1a2e;
                color: #e0e0e0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 14px;
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }
            .fg-page-header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 6px 12px;
                background: #16213e;
                border-bottom: 1px solid #333;
                font-size: 0.8em;
                flex-shrink: 0;
            }
            .fg-page-header .fg-title { color: #6c63ff; font-weight: 600; }
            .fg-page-header .fg-stats { color: #888; }

            /* Main container */
            #fg-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* Loading */
            #loading {
                display: flex;
                align-items: center;
                justify-content: center;
                flex: 1;
                color: #888;
                font-size: 1.1em;
                gap: 0.6em;
            }
            #loading.hidden { display: none; }
            .spinner {
                width: 1.2em; height: 1.2em;
                border: 2px solid #444;
                border-top-color: #aaa;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }

            /* Error */
            #error {
                display: none;
                align-items: center;
                justify-content: center;
                flex: 1;
                color: #ff6b6b;
                font-size: 1em;
                padding: 24px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="fg-page-header">
            <span class="fg-title" id="fg-title">Flamegraph</span>
            <span class="fg-stats" id="fg-stats"></span>
        </div>
        <div id="fold-warning" style="display:none;padding:6px 12px;background:#3a1a1a;color:#ffb3b3;border-bottom:1px solid #5a2a2a;font-size:0.8em;flex-shrink:0;font-family:monospace;white-space:pre-wrap;word-break:break-word;"></div>
        <div id="fg-container"></div>
        <div id="loading"><div class="spinner"></div>Loading trace&hellip;</div>
        <div id="error"></div>

        <script src="format.js"></script>
        <script src="flamegraph_api.js"></script>
        <script src="sse.js"></script>
        <script src="flamegraph_diff.js"></script>
        <script src="flamegraph_diff_view.js"></script>
        <script src="decode.js"></script>
        <script src="trace_parser.js"></script>
        <script src="creds.js"></script>
        <script src="trace_scope.js"></script>
        <script src="trace_analysis.js"></script>
        <script src="flamegraph_export.js"></script>
        <script src="flamegraph.js"></script>
        <script>
            (async function () {
                const params = new URLSearchParams(window.location.search);
                // `trace` is repeatable — each value is a separate (possibly
                // gzipped) component to fetch and concatenate. A `s_*` scope
                // (bucket/prefix/service/host-set + window) is the compact,
                // stateless form the S3 browser emits for large exact-mode
                // selections; it's resolved to trace= URLs just below.
                let traceUrls = params.getAll("trace");
                const startNs = params.get("start") != null ? Number(params.get("start")) : null;
                const endNs = params.get("end") != null ? Number(params.get("end")) : null;

                const loadingEl = document.getElementById("loading");
                const errorEl = document.getElementById("error");
                const containerEl = document.getElementById("fg-container");
                const titleEl = document.getElementById("fg-title");
                const statsEl = document.getElementById("fg-stats");
                const foldWarnEl = document.getElementById("fold-warning");

                // A shared link pins the bucket's region — as `aws_region` on an
                // aggregate/diff link, or `s_region` inside an exact-decode scope
                // (see trace_scope.js and credentials::QUERY_REGION). Region is a
                // property of the bucket, not a secret. Fold it into the
                // credentials store so every /api/* request from this tab carries
                // the x-dial9-aws-region header, exactly like the home page does
                // on load. Without this, a cross-region bucket (e.g. one in
                // us-west-2) is signed for the server's default region, the S3
                // listing comes back empty, and the flamegraph 404s with "no
                // source files match this scope". No-op when no creds are stored
                // (region is header-only) or no region is in the URL.
                const urlRegion = params.get("aws_region") || params.get("s_region");
                if (urlRegion && window.Dial9Creds) {
                    const stored = Dial9Creds.get();
                    if (stored && stored.region !== urlRegion) Dial9Creds.setRegion(urlRegion);
                }

                function showError(msg) {
                    loadingEl.classList.add("hidden");
                    errorEl.style.display = "flex";
                    errorEl.textContent = msg;
                }

                // --- Diff mode: two-sided differential flamegraph (?diff=1) ---
                // Side A (left) and side B (right) are independent aggregate
                // scopes (each a base64url'd query in `a=`/`b=`). Both default to
                // this tab's session credentials; if side B comes from a
                // different account/bucket and 401/403s, we prompt for B's
                // credentials and hold them IN MEMORY only (never in the URL,
                // never in sessionStorage).
                const diffParsed = FlamegraphDiff.parseDiff(params);
                if (diffParsed) {
                    document.title = "Flamegraph diff";
                    titleEl.textContent = "Flamegraph diff";
                    loadingEl.classList.add("hidden");
                    containerEl.style.display = "flex";

                    // Per-side credentials. `a`/`b` default to the shared
                    // session creds; `credsB` overrides B once supplied.
                    let credsB = null; // {accessKeyId, secretAccessKey, sessionToken?, region?}
                    function sessionHeaders() {
                        return window.Dial9Creds ? Dial9Creds.headers() : {};
                    }
                    function credsToHeaders(c) {
                        const h = {
                            "x-dial9-aws-access-key-id": c.accessKeyId,
                            "x-dial9-aws-secret-access-key": c.secretAccessKey,
                        };
                        if (c.sessionToken) h["x-dial9-aws-session-token"] = c.sessionToken;
                        if (c.region) h["x-dial9-aws-region"] = c.region;
                        return h;
                    }
                    function headersFor(side) {
                        if (side === "b" && credsB) return credsToHeaders(credsB);
                        return sessionHeaders();
                    }

                    let view = null;
                    let bCredsPrompted = false;
                    function onSideError(side, err) {
                        const auth = err && (err.status === 401 || err.status === 403);
                        if (side === "b" && auth && !bCredsPrompted) {
                            bCredsPrompted = true;
                            promptForBCreds(err.message);
                            return;
                        }
                        statsEl.textContent =
                            "Side " + side.toUpperCase() + " failed: " + (err && err.message || err);
                    }

                    // In-memory creds prompt for side B. Reuses Dial9Creds.parse()
                    // to accept the same pasted blobs as the home page (STS JSON
                    // or flat JSON), and validates them against B's bucket via
                    // /api/credentials/check — which both confirms access and
                    // resolves B's region (B is typically in a different region,
                    // and the region is needed for the S3 endpoint host). Creds
                    // are held in memory for this tab only.
                    const bBucket = diffParsed.b.get("bucket");
                    async function checkBCreds(creds) {
                        // POST the candidate creds as headers (without storing
                        // them) so the server can HeadBucket B's bucket.
                        const url = "/api/credentials/check" +
                            (bBucket ? "?bucket=" + encodeURIComponent(bBucket) : "");
                        const resp = await fetch(url, { method: "POST", headers: credsToHeaders(creds) });
                        if (!resp.ok) return { ok: false, error: await resp.text().catch(() => "check failed") };
                        return await resp.json();
                    }
                    function promptForBCreds(reason) {
                        const back = document.createElement("div");
                        back.className = "fgd-dialog-backdrop";
                        back.innerHTML =
                            '<div class="fgd-dialog">' +
                            '<h3>Side B needs credentials</h3>' +
                            '<p>The B capture is in a different account or bucket (<code>' +
                            (bBucket ? bBucket.replace(/[<>&]/g, "") : "?") + '</code>). ' +
                            'Paste temporary AWS credentials for it (JSON). They are kept ' +
                            'in memory for this tab only — never stored, never put in the URL.</p>' +
                            '<textarea rows="6" placeholder=\'{"accessKeyId":"...","secretAccessKey":"...","sessionToken":"..."}\'></textarea>' +
                            '<div class="fgd-err"></div>' +
                            '<div class="fgd-dialog-row"><button class="fgd-apply">Apply &amp; retry B</button>' +
                            '<button class="ghost fgd-cancel">Cancel</button></div>' +
                            '</div>';
                        document.body.appendChild(back);
                        const ta = back.querySelector("textarea");
                        const errEl = back.querySelector(".fgd-err");
                        const applyBtn = back.querySelector(".fgd-apply");
                        if (reason) errEl.textContent = reason;
                        ta.focus();
                        back.querySelector(".fgd-cancel").addEventListener("click", () => back.remove());
                        applyBtn.addEventListener("click", async () => {
                            let parsed;
                            try {
                                parsed = Dial9Creds.parse(ta.value);
                            } catch (e) {
                                errEl.textContent = "Could not parse: " + e.message;
                                return;
                            }
                            applyBtn.disabled = true;
                            errEl.textContent = "Checking credentials…";
                            const result = await checkBCreds(parsed);
                            if (!result.ok) {
                                applyBtn.disabled = false;
                                errEl.textContent = "Rejected: " + (result.error || "could not access bucket");
                                return;
                            }
                            // Carry the detected region so the listing hits the
                            // right regional endpoint.
                            if (result.region && !parsed.region) parsed.region = result.region;
                            credsB = parsed;
                            back.remove();
                            bCredsPrompted = false;
                            if (view) view.repollSide("b");
                        });
                    }

                    view = FlamegraphDiffView.createDiffView(containerEl, {
                        scopeA: diffParsed.a,
                        scopeB: diffParsed.b,
                        headersFor: headersFor,
                        onSideError: onSideError,
                    });
                    statsEl.textContent = "A (left) vs B (right) · blue = heavier in A, red = heavier in B";
                    return;
                }

                // --- API mode: fetch pre-built flamegraph tree from server ---
                const apiMode = params.get("api") === "1";
                if (apiMode) {
                    // One-line human summary of a scope (service · N hosts · time
                    // window), for the diff dialog's A/B preview rows.
                    function summarizeScope(scope) {
                        if (!scope) return "—";
                        const bits = [];
                        const svc = scope.get("service");
                        if (svc) bits.push(svc);
                        const hosts = scope.getAll("host");
                        if (hosts.length === 1) bits.push("1 host");
                        else if (hosts.length > 1) bits.push(hosts.length + " hosts");
                        const tc = scope.get("thread_class");
                        if (tc) bits.push(tc);
                        const src = scope.get("source");
                        if (src && src !== "cpu") bits.push(src);
                        const s = scope.get("start_ns"), e = scope.get("end_ns");
                        if (s && e) {
                            const from = new Date(Number(s) / 1e6).toISOString().slice(5, 16).replace("T", " ");
                            const dur = formatHumanDuration(Number(e) - Number(s));
                            bits.push(from + " UTC · " + dur);
                        }
                        const bkt = scope.get("bucket");
                        if (bkt) bits.push(bkt);
                        return bits.join(" · ") || "(empty scope)";
                    }

                    // Diff-setup dialog: this tab is one side; the user pastes a
                    // "Copy link" URL for the other. `thisScope` is this tab's
                    // current scope (URLSearchParams). A (left, blue) defaults to
                    // this tab, B (right, red) to the pasted link; Swap flips them.
                    //
                    // Above the paste box are one-click PRESETS (issue #624) that
                    // derive side B from side A (thisScope) without a second tab:
                    // "same time, different host" (a dropdown of the hosts this tab
                    // knows about) and "same scope, earlier window" (-1h/-24h/-7d).
                    // Each preset builds scopeB via the pure FlamegraphDiff helpers
                    // and opens the two-sided diff directly.
                    function openDiffDialog(thisScope) {
                        let otherScope = null; // parsed from the paste, or null
                        let thisIsA = true;

                        // Hosts this tab knows about, for preset 1. availFacets is
                        // scoped to the current query, so it only lists hosts
                        // WITHIN thisScope — if the flamegraph was launched
                        // constrained to a single host we can't offer others (the
                        // preset is disabled below). Union the facet's hosts with
                        // any hosts already on the scope so a seeded-but-not-yet-
                        // responded tab still lists them.
                        const hostSet = new Set(thisScope.getAll("host"));
                        const hostFacet = availFacets["host"];
                        if (hostFacet) for (const h of hostFacet.values) hostSet.add(h);
                        const allHosts = [...hostSet].sort();
                        const scopeHosts = thisScope.getAll("host");
                        // A single-host scope B target excludes the host thisScope
                        // is already pinned to (comparing a host to itself is a
                        // no-op); when thisScope spans multiple hosts, offer them
                        // all as the "other" host.
                        const otherHosts = scopeHosts.length === 1
                            ? allHosts.filter((h) => h !== scopeHosts[0])
                            : allHosts;
                        const canHostPreset = otherHosts.length > 0;
                        // Time presets need a window on thisScope to shift.
                        const canTimePreset = !!(thisScope.get("start_ns") && thisScope.get("end_ns"));

                        const back = document.createElement("div");
                        back.className = "fgd-dialog-backdrop";
                        const hostOptions = otherHosts
                            .map((h) => '<option value="' + escFg(h) + '">' + escFg(h) + '</option>')
                            .join("");
                        const presetHtml =
                            '<div class="fgd-presets">' +
                            '<div class="fgd-preset-group">' +
                            '<label>Same time, different host</label>' +
                            (canHostPreset
                                ? '<select class="fgd-preset-host"><option value="">Pick a host to compare…</option>' + hostOptions + '</select>'
                                : '<p class="fgd-preset-note">Scope covers a single host — launch the flamegraph over multiple hosts to compare.</p>') +
                            '</div>' +
                            '<div class="fgd-preset-group">' +
                            '<label>Same scope, earlier window</label>' +
                            (canTimePreset
                                ? '<div class="fgd-preset-btns">' +
                                  '<button class="ghost fgd-preset" data-shift="1h">-1h</button>' +
                                  '<button class="ghost fgd-preset" data-shift="24h">-24h</button>' +
                                  '<button class="ghost fgd-preset" data-shift="7d">-7d</button>' +
                                  '</div>'
                                : '<p class="fgd-preset-note">No time window on this scope to shift.</p>') +
                            '</div>' +
                            '</div>';
                        back.innerHTML =
                            '<div class="fgd-dialog fgd-diff-dialog">' +
                            '<h3>Compare against another flamegraph</h3>' +
                            '<p>Pick a preset below, or paste another aggregate flamegraph\'s ' +
                            '<b>Copy link</b> URL. The two are shown side by side — left vs right.</p>' +
                            presetHtml +
                            '<label>Other flamegraph link</label>' +
                            '<textarea class="fgd-other" rows="2" placeholder="https://…/flamegraph.html?api=1&bucket=…"></textarea>' +
                            '<div class="fgd-ab">' +
                            '  <div class="fgd-ab-side"><span class="fgd-chip fgd-chip-a">A · left</span>' +
                            '    <span class="fgd-ab-src" data-side="a"></span>' +
                            '    <div class="fgd-ab-sum" data-side="a"></div></div>' +
                            '  <button class="ghost fgd-swap" title="Swap which capture is A vs B">⇄ Swap</button>' +
                            '  <div class="fgd-ab-side"><span class="fgd-chip fgd-chip-b">B · right</span>' +
                            '    <span class="fgd-ab-src" data-side="b"></span>' +
                            '    <div class="fgd-ab-sum" data-side="b"></div></div>' +
                            '</div>' +
                            '<div class="fgd-err"></div>' +
                            '<div class="fgd-dialog-row">' +
                            '<button class="fgd-compare">Compare</button>' +
                            '<button class="ghost fgd-cancel">Cancel</button></div>' +
                            '</div>';
                        document.body.appendChild(back);
                        const ta = back.querySelector(".fgd-other");
                        const errEl = back.querySelector(".fgd-err");
                        const srcA = back.querySelector('.fgd-ab-src[data-side="a"]');
                        const srcB = back.querySelector('.fgd-ab-src[data-side="b"]');
                        const sumA = back.querySelector('.fgd-ab-sum[data-side="a"]');
                        const sumB = back.querySelector('.fgd-ab-sum[data-side="b"]');
                        ta.focus();

                        // Re-parse the paste (cheap) and refresh the A/B preview.
                        function refresh() {
                            const raw = ta.value.trim();
                            otherScope = null;
                            if (raw) {
                                try {
                                    const u = new URL(raw, window.location.origin);
                                    if (u.searchParams.get("api") !== "1") throw 0;
                                    const s = FlamegraphDiff.fullScopeQuery(u.searchParams);
                                    if (s.get("bucket") || s.get("data_dir")) otherScope = s;
                                } catch (e) { /* leave null; preview shows placeholder */ }
                            }
                            const thisSum = summarizeScope(thisScope);
                            const otherSum = otherScope ? summarizeScope(otherScope)
                                : (raw ? "⚠ not a valid Copy link" : "paste a link above");
                            srcA.textContent = thisIsA ? "this tab" : "pasted link";
                            srcB.textContent = thisIsA ? "pasted link" : "this tab";
                            sumA.textContent = thisIsA ? thisSum : otherSum;
                            sumB.textContent = thisIsA ? otherSum : thisSum;
                        }
                        refresh();
                        ta.addEventListener("input", refresh);

                        // Preset launch: build scopeB from thisScope and open the
                        // two-sided diff (thisScope stays side A). Same window.open
                        // path as the Compare button below.
                        function launchPreset(scopeB) {
                            const search = FlamegraphDiff.diffSearch(thisScope, scopeB);
                            window.open(window.location.pathname + "?" + search, "_blank");
                            back.remove();
                        }
                        const hostSel = back.querySelector(".fgd-preset-host");
                        if (hostSel) {
                            hostSel.addEventListener("change", () => {
                                if (!hostSel.value) return;
                                launchPreset(FlamegraphDiff.scopeWithHost(thisScope, hostSel.value));
                            });
                        }
                        const shiftDeltas = {
                            "1h": FlamegraphDiff.DIFF_SHIFT_1H,
                            "24h": FlamegraphDiff.DIFF_SHIFT_24H,
                            "7d": FlamegraphDiff.DIFF_SHIFT_7D,
                        };
                        for (const btn of back.querySelectorAll(".fgd-preset")) {
                            btn.addEventListener("click", () => {
                                launchPreset(FlamegraphDiff.shiftScopeTime(thisScope, shiftDeltas[btn.getAttribute("data-shift")]));
                            });
                        }

                        back.querySelector(".fgd-swap").addEventListener("click", () => { thisIsA = !thisIsA; refresh(); });
                        back.querySelector(".fgd-cancel").addEventListener("click", () => back.remove());
                        back.addEventListener("click", (e) => { if (e.target === back) back.remove(); });
                        back.querySelector(".fgd-compare").addEventListener("click", () => {
                            if (!otherScope) {
                                errEl.textContent = ta.value.trim()
                                    ? "That link isn't an aggregate flamegraph Copy link (needs api=1 and a bucket)."
                                    : "Paste the other flamegraph's Copy link first.";
                                return;
                            }
                            const scopeA = thisIsA ? thisScope : otherScope;
                            const scopeB = thisIsA ? otherScope : thisScope;
                            const search = FlamegraphDiff.diffSearch(scopeA, scopeB);
                            window.open(window.location.pathname + "?" + search, "_blank");
                            back.remove();
                        });
                    }

                    // --- Filter toolbar (data-driven) ---
                    // The facet controls (Thread / Source / Host) are NOT
                    // hard-coded: they're built from the backend's reported
                    // `metadata` facets on the first response (see renderFacets),
                    // so the toolbar offers only dimensions that actually have
                    // data. The time pickers and action buttons are intrinsic, so
                    // they stay static.
                    const ctlStyle = "background:#1a1a2e;color:#e0e0e0;border:1px solid #444;padding:2px 6px;border-radius:3px";
                    const btnStyle = "border:1px solid #444;padding:4px 14px;border-radius:3px;cursor:pointer;font-weight:600";
                    const toolbar = document.createElement("div");
                    toolbar.style.cssText = "display:flex;align-items:center;gap:12px;padding:6px 12px;background:#16213e;border-bottom:1px solid #333;font-size:0.8em;flex-shrink:0;flex-wrap:wrap;";
                    toolbar.innerHTML = `
                        <span id="f-facets" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"></span>
                        <label style="color:#e0e0e0">From: <input id="f-start" type="datetime-local" step="1" style="${ctlStyle}"></label>
                        <label style="color:#e0e0e0">To: <input id="f-end" type="datetime-local" step="1" style="${ctlStyle}"></label>
                        <button id="f-apply" style="background:#6c63ff;color:#fff;border:none;padding:4px 14px;border-radius:3px;cursor:pointer;font-weight:600">Apply</button>
                        <button id="f-more" style="background:#2a2a4a;color:#e0e0e0;${btnStyle}">Refine more</button>
                        <button id="f-stop" style="background:#2a2a4a;color:#e0e0e0;${btnStyle};opacity:0.4;cursor:not-allowed" disabled>Stop</button>
                        <span style="flex:1"></span>
                        <button id="f-copylink" title="Copy a link that re-fetches this exact scope (bucket/prefix included; no credentials)" style="background:#2a2a4a;color:#e0e0e0;border:1px solid #444;padding:4px 14px;border-radius:3px;cursor:pointer;font-weight:600">Copy link</button>
                        <button id="f-adddiff" title="Capture this view (current host/filters) as one side of a diff; pick a second host/scope and add it to compare" style="background:#2a2a4a;color:#e0e0e0;border:1px solid #444;padding:4px 14px;border-radius:3px;cursor:pointer;font-weight:600">+ Add to diff</button>
                        <button id="f-diff" title="Compare this flamegraph against another" style="background:#2a2a4a;color:#e0e0e0;border:1px solid #444;padding:4px 14px;border-radius:3px;cursor:pointer;font-weight:600">Diff…</button>
                    `;
                    document.querySelector(".fg-page-header").after(toolbar);

                    // In-page "Add to diff" tray. Captures two scopes (A/B) from
                    // this page's live view — respecting the Host dropdown's
                    // selection — and launches a two-sided diff, so a host-vs-host
                    // comparison needs no second tab / Copy-link paste. The tray
                    // lives OUTSIDE #f-facets (which renderFacets rebuilds on every
                    // SSE response), so it survives facet re-renders; the capture
                    // state (diffCapture) is held in the enclosing closure for the
                    // same reason. Mirrors the landing page's diff tray
                    // (index.html), reusing the shared FlamegraphDiff codec.
                    let diffCapture = { a: null, b: null };
                    const diffTray = document.createElement("div");
                    diffTray.style.cssText = "display:none;align-items:center;gap:12px;padding:6px 12px;background:#14142a;border-bottom:1px solid #333;font-size:0.8em;flex-shrink:0;flex-wrap:wrap;";
                    toolbar.after(diffTray);

                    // HTML-escape scope summaries before injecting into the tray.
                    function escFg(s) {
                        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
                            .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
                    }

                    function renderDiffTray() {
                        const { a, b } = diffCapture;
                        if (!a && !b) { diffTray.style.display = "none"; return; }
                        diffTray.style.display = "flex";
                        function sideCell(label, scope, chipBg, chipFg, sideKey) {
                            const set = !!scope;
                            return `<div style="background:#1a1a2e;border:1px solid ${set ? chipFg : "#333"};border-radius:6px;padding:6px 10px;min-width:0">
                                <div style="display:flex;align-items:center;gap:8px">
                                    <span style="font-size:0.85em;font-weight:700;padding:2px 8px;border-radius:10px;background:${chipBg};color:${chipFg}">${label}</span>
                                    ${set ? `<span style="flex:1"></span><button data-fgd-remove="${sideKey}" title="Remove ${label}" style="background:none;border:none;color:#888;cursor:pointer;font-size:1em">✕</button>` : ""}
                                </div>
                                <div style="color:#ccc;margin-top:4px;overflow-wrap:anywhere">${set ? escFg(summarizeScope(scope)) : '<span style="color:#666">pick a host/scope, then click "Add to diff"</span>'}</div>
                            </div>`;
                        }
                        const ready = !!(a && b);
                        diffTray.innerHTML =
                            '<span style="color:#888;font-weight:600">Diff capture:</span>' +
                            sideCell("A · left", a, "#1e3050", "#9ec1ff", "a") +
                            sideCell("B · right", b, "#4a221c", "#ffb3a0", "b") +
                            `<button data-fgd-swap ${ready ? "" : "disabled"} title="Swap which capture is A vs B" style="background:#2a2a4a;color:#e0e0e0;${btnStyle};opacity:${ready ? "1" : "0.4"};cursor:${ready ? "pointer" : "not-allowed"}">⇄ Swap</button>` +
                            `<button data-fgd-open ${ready ? "" : "disabled"} title="Open a two-sided diff of A vs B" style="background:#6c63ff;color:#fff;border:none;padding:4px 14px;border-radius:3px;font-weight:600;opacity:${ready ? "1" : "0.4"};cursor:${ready ? "pointer" : "not-allowed"}">Open diff</button>` +
                            `<button data-fgd-clear title="Clear both captured sides" style="background:#2a2a4a;color:#e0e0e0;${btnStyle}">Clear</button>`;
                    }

                    // Delegated handlers for the tray's (re-rendered) controls.
                    diffTray.addEventListener("click", (e) => {
                        const rm = e.target.closest("[data-fgd-remove]");
                        if (rm) { diffCapture = FlamegraphDiff.removeDiffSide(diffCapture, rm.getAttribute("data-fgd-remove")); renderDiffTray(); return; }
                        if (e.target.closest("[data-fgd-swap]")) { diffCapture = FlamegraphDiff.swapDiffCapture(diffCapture); renderDiffTray(); return; }
                        if (e.target.closest("[data-fgd-clear]")) { diffCapture = { a: null, b: null }; renderDiffTray(); return; }
                        if (e.target.closest("[data-fgd-open]")) {
                            const { a, b } = diffCapture;
                            if (!a || !b) return;
                            // Both captured scopes already carry api=1
                            // (currentScopeQuery sets it), so no per-side flag
                            // fix-up is needed here.
                            const search = FlamegraphDiff.diffSearch(a, b);
                            window.open(window.location.pathname + "?" + search, "_blank");
                        }
                    });

                    const fStart = document.getElementById("f-start");
                    const fEnd = document.getElementById("f-end");

                    // The original scope host set from the URL (the heatmap box
                    // selection). "All" in the host selector re-applies this set;
                    // a named host narrows to one. Kept separate from the live
                    // selection so "All" never broadens past the original scope.
                    const originalHosts = params.getAll("host");

                    // Single source of truth for the query. Seeded from the URL,
                    // mutated by the facet controls, read by buildApiUrl /
                    // updateBrowserUrl. Deliberately decoupled from the DOM so the
                    // stream can open before the (data-driven) facet selects
                    // even exist.
                    const filterState = {
                        // Source defaults to "cpu" (the on-CPU view).
                        source: params.get("source") || "cpu",
                        thread_class: params.get("thread_class") || "",
                        spawn_location: params.get("spawn_location") || "",
                        hosts: originalHosts.slice(),
                    };

                    // Initialize datetime pickers from URL ns params. The picker
                    // shows UTC wall-clock (S3 trace keys are bucketed in UTC).
                    // The read (ns -> picker) and write (picker -> ns) sides MUST
                    // be symmetric: both treat the picker value as UTC. See the
                    // unit-tested nsToPickerUtc / pickerUtcToNs in
                    // flamegraph_api.js (test_flamegraph_api.js).
                    if (params.get("start_ns")) fStart.value = nsToPickerUtc(params.get("start_ns"));
                    if (params.get("end_ns")) fEnd.value = nsToPickerUtc(params.get("end_ns"));

                    // `max_files` ceiling override, raised by the "Refine more"
                    // button. null = let the backend pick its own ceiling.
                    let maxFiles = params.get("max_files") ? Number(params.get("max_files")) : null;

                    // Scope dimensions that define WHICH files the server-side
                    // loop samples (the box's service; hosts live in filterState).
                    const scopeService = params.get("service");
                    const scopeBucket = params.get("bucket");
                    const scopePrefix = params.get("prefix");
                    // The bucket's region. Already folded into the creds store
                    // above (so it rides as a header), but we also keep it in the
                    // address bar and any copy/diff link so a shared URL stays
                    // self-contained rather than depending on the tab's store.
                    const scopeRegion = params.get("aws_region");

                    function buildApiUrl() {
                        const u = new URL("/api/flamegraph", window.location.origin);
                        if (params.get("data_dir")) u.searchParams.set("data_dir", params.get("data_dir"));
                        if (scopeBucket) u.searchParams.set("bucket", scopeBucket);
                        // Region also travels as a header (Dial9Creds), but naming
                        // it on the URL keeps the request self-describing and works
                        // even on the ambient (no-creds) path.
                        if (scopeRegion) u.searchParams.set("aws_region", scopeRegion);
                        if (scopePrefix) u.searchParams.set("prefix", scopePrefix);
                        if (scopeService) u.searchParams.set("service", scopeService);
                        for (const h of filterState.hosts) u.searchParams.append("host", h);
                        // Send all non-empty facet filters as query params.
                        for (const [k, v] of Object.entries(filterState)) {
                            if (k === "hosts" || !v) continue;
                            u.searchParams.set(k, v);
                        }
                        const startNs = pickerUtcToNs(fStart.value);
                        const endNs = pickerUtcToNs(fEnd.value);
                        if (startNs) u.searchParams.set("start_ns", startNs);
                        if (endNs) u.searchParams.set("end_ns", endNs);
                        if (maxFiles != null) u.searchParams.set("max_files", String(maxFiles));
                        // The endpoint is an SSE stream: the server emits the
                        // already-folded snapshot first, then folds to the cap and
                        // pushes a fresh tree per file. No client `refine` flag.
                        return u;
                    }

                    function updateBrowserUrl() {
                        const p = new URLSearchParams();
                        p.set("api", "1");
                        if (params.get("data_dir")) p.set("data_dir", params.get("data_dir"));
                        if (scopeBucket) p.set("bucket", scopeBucket);
                        if (scopeRegion) p.set("aws_region", scopeRegion);
                        if (scopePrefix) p.set("prefix", scopePrefix);
                        if (scopeService) p.set("service", scopeService);
                        for (const h of filterState.hosts) p.append("host", h);
                        for (const [k, v] of Object.entries(filterState)) {
                            if (k === "hosts" || !v) continue;
                            p.set(k, v);
                        }
                        const startNs = pickerUtcToNs(fStart.value);
                        const endNs = pickerUtcToNs(fEnd.value);
                        if (startNs) p.set("start_ns", startNs);
                        if (endNs) p.set("end_ns", endNs);
                        history.pushState(null, "", window.location.pathname + "?" + p.toString());
                    }

                    // Build the data-driven facet controls from the backend's
                    // reported metadata facets. Called on every response, but only
                    // rebuilds when the *available* facet set changes (the
                    // facets are recorded independent of the active filter, so
                    // they stay stable as the user flips selectors). The guard
                    // also avoids clobbering a <select> mid-interaction. Each
                    // control writes back to filterState and re-applies.
                    // Accumulated available facets. The backend's facet metadata
                    // is scoped to the *current* query, so narrowing one
                    // dimension collapses the others (picking a single host makes
                    // that response report only that host, only its sources,
                    // etc.). We union every response's facets into
                    // monotonically-growing sets, so a control never loses an
                    // option it once offered — otherwise selecting a host would
                    // make the host selector vanish and you could never get back
                    // to "All". Seeded with the original scope hosts so the
                    // selector is correct even before the first response.
                    const availFacets = {};
                    let renderedFacetKey = null;
                    function renderFacets(meta) {
                        // Accumulate from generic facets array.
                        for (const f of meta.facets || []) {
                            if (!availFacets[f.name]) availFacets[f.name] = {label: f.label, values: new Set()};
                            for (const v of f.values) availFacets[f.name].values.add(v);
                        }
                        // Seed host facet from original scope hosts.
                        if (availFacets["host"]) {
                            for (const h of originalHosts) availFacets["host"].values.add(h);
                        }

                        const key = JSON.stringify(Object.fromEntries(
                            Object.entries(availFacets).map(([k, v]) => [k, [...v.values].sort()])
                        ));
                        if (key === renderedFacetKey) return;
                        renderedFacetKey = key;

                        const container = document.getElementById("f-facets");
                        container.innerHTML = "";

                        function addSelect(labelText, options, selected, onChange) {
                            const label = document.createElement("label");
                            label.style.color = "#e0e0e0";
                            label.appendChild(document.createTextNode(labelText + " "));
                            const sel = document.createElement("select");
                            sel.style.cssText = ctlStyle;
                            for (const opt of options) {
                                const o = document.createElement("option");
                                o.value = opt.value;
                                o.textContent = opt.label;
                                if (opt.value === selected) o.selected = true;
                                sel.appendChild(o);
                            }
                            sel.addEventListener("change", () => onChange(sel.value));
                            label.appendChild(sel);
                            container.appendChild(label);
                        }

                        function applyFacetChange() {
                            maxFiles = null;
                            updateBrowserUrl();
                            startStreaming();
                        }

                        // Render each facet generically.
                        for (const [name, {label, values}] of Object.entries(availFacets)) {
                            const sorted = [...values].sort();
                            if (name === "host") {
                                if (sorted.length > 1) {
                                    const selectedHost = filterState.hosts.length === 1 ? filterState.hosts[0] : "";
                                    addSelect(label + ":", hostFacetOptions(sorted), selectedHost, (v) => {
                                        filterState.hosts = v ? [v] : originalHosts.slice();
                                        applyFacetChange();
                                    });
                                }
                                continue;
                            }
                            if (sorted.length <= 1) continue;
                            const opts = [{value: "", label: "All"}, ...sorted.map(v => ({value: v, label: v}))];
                            const current = filterState[name] || "";
                            addSelect(label + ":", opts, current, (v) => {
                                filterState[name] = v;
                                applyFacetChange();
                            });
                        }
                    }

                    // Render the scope summary in the page header from the
                    // backend's resolved scope + facets (service · host(s) ·
                    // time range), so the header reflects backend truth rather
                    // than URL params the client guessed at.
                    function renderScopeHeader(meta) {
                        const bits = [];
                        const hostNames = meta.host_names || [];
                        if (hostNames.length === 1) bits.push(hostNames[0]);
                        else if (hostNames.length > 1) bits.push(`${hostNames.length} hosts`);
                        if (meta.min_timestamp_ns && meta.max_timestamp_ns) {
                            const from = new Date(meta.min_timestamp_ns / 1e6).toISOString().slice(0, 19) + "Z";
                            const to = new Date(meta.max_timestamp_ns / 1e6).toISOString().slice(11, 19) + "Z";
                            bits.push(`${from} \u2192 ${to}`);
                        }
                        const svc = meta.service || "aggregated";
                        document.title = `Flamegraph \u2014 ${svc}`;
                        titleEl.textContent = bits.length
                            ? `Flamegraph \u2014 ${svc} \u00b7 ${bits.join(" \u00b7 ")}`
                            : `Flamegraph \u2014 ${svc}`;
                    }

                    function toFgTree(node) {
                        const m = new Map();
                        for (const child of (node.children || [])) {
                            m.set(child.name, toFgTree(child));
                        }
                        return { name: node.name, count: node.count, self: node.self, children: m };
                    }

                    const fg = FlamegraphRenderer.createFlamegraph(containerEl);

                    // Build the base stats string ("N samples \u00b7 M hosts \u00b7 \u2026")
                    // from the response metadata, shared by every event.
                    function baseStats(resp) {
                        const meta = resp.metadata;
                        const bits = [`${resp.total_samples.toLocaleString()} samples`];
                        if (meta.hosts > 1) bits.push(`${meta.hosts} hosts`);
                        if (meta.min_timestamp_ns && meta.max_timestamp_ns) {
                            const from = new Date(meta.min_timestamp_ns / 1e6);
                            const to = new Date(meta.max_timestamp_ns / 1e6);
                            const dur = formatHumanDuration(meta.max_timestamp_ns - meta.min_timestamp_ns);
                            bits.push(`${from.toISOString().slice(11,19)} \u2192 ${to.toISOString().slice(11,19)} (${dur})`);
                        }
                        return bits.join(" \u00b7 ");
                    }

                    // Stream state. Each open stream gets an AbortController; the
                    // next start (filters change, "Refine more") or "Stop" aborts
                    // it. A monotonic `streamToken` guards late callbacks from a
                    // stream that has since been superseded.
                    let streamToken = 0;
                    let abortCtl = null;
                    // The last-rendered coverage badge (without the trailing status
                    // suffix), so close/stop handlers can re-stamp it. `lastCoverage`
                    // feeds the "Refine more" ceiling computation.
                    let lastBadge = "";
                    let lastCoverage = null;
                    let gotEvent = false;
                    const stopBtn = document.getElementById("f-stop");
                    const moreBtn = document.getElementById("f-more");

                    function setRefiningUi(active) {
                        // Stop button: enabled only while streaming.
                        stopBtn.disabled = !active;
                        stopBtn.style.opacity = active ? "1" : "0.4";
                        stopBtn.style.cursor = active ? "pointer" : "not-allowed";
                        // Fetch-more button: enabled only when idle (stream closed).
                        moreBtn.disabled = active;
                        moreBtn.style.opacity = active ? "0.4" : "1";
                        moreBtn.style.cursor = active ? "not-allowed" : "pointer";
                    }

                    function stopStreaming() {
                        streamToken++;
                        if (abortCtl) { abortCtl.abort(); abortCtl = null; }
                        setRefiningUi(false);
                    }

                    // Render one streamed snapshot (a full FlamegraphResponse).
                    function renderEvent(resp) {
                        gotEvent = true;
                        const meta = resp.metadata;
                        // Header scope summary + filter controls are both built
                        // from the backend's reported metadata (data-driven).
                        renderScopeHeader(meta);
                        renderFacets(meta);

                        // First event hides the loading overlay; later events
                        // refine in-place without it.
                        loadingEl.classList.add("hidden");
                        containerEl.style.display = "flex";
                        fg.setTreeDirect(toFgTree(resp.tree), resp.tree.count);

                        const cov = resp.coverage;
                        lastCoverage = cov;
                        if (cov == null) {
                            // Local-dir / non-aggregation mode: no coverage badge.
                            lastBadge = baseStats(resp);
                        } else {
                            lastBadge = baseStats(resp) + " \u00b7 " + formatCoverageBadge(cov);
                        }
                        statsEl.innerHTML = lastBadge + ' \u00b7 <span class="spinner" style="width:0.9em;height:0.9em;display:inline-block;vertical-align:middle"></span> refining\u2026';

                        // Surface fold failures (e.g. unwritable output bucket) as a
                        // banner so a systematic failure isn't a silent empty tree.
                        const notice = foldErrorNotice(cov);
                        if (notice) {
                            foldWarnEl.textContent = notice;
                            foldWarnEl.style.display = "block";
                        } else {
                            foldWarnEl.style.display = "none";
                        }
                    }

                    // (Re)start the stream from scratch: aborts any in-flight
                    // stream and shows the loading overlay. The server emits the
                    // already-folded snapshot immediately, then refines to the cap.
                    function startStreaming() {
                        stopStreaming();
                        setRefiningUi(true);
                        gotEvent = false;
                        loadingEl.classList.remove("hidden");
                        loadingEl.innerHTML = '<div class="spinner"></div>Loading aggregated flamegraph\u2026';
                        containerEl.style.display = "none";
                        errorEl.style.display = "none";
                        foldWarnEl.style.display = "none";
                        const token = ++streamToken;
                        abortCtl = new AbortController();
                        const credHeaders = window.Dial9Creds ? Dial9Creds.headers() : {};
                        Dial9Sse.openSse(buildApiUrl(), {
                            headers: credHeaders,
                            signal: abortCtl.signal,
                            onEvent: (resp) => { if (token === streamToken) renderEvent(resp); },
                            onClose: () => {
                                if (token !== streamToken) return;
                                // Server folded to the cap and closed the stream.
                                statsEl.textContent = lastBadge + (gotEvent ? " \u00b7 refined" : "");
                                setRefiningUi(false);
                            },
                            onError: (err) => {
                                if (token !== streamToken) return;
                                if (!gotEvent) {
                                    showError("Failed to load flamegraph: " + err.message);
                                } else {
                                    // Mid-stream drop: keep the rendered tree but
                                    // clear the (would-be-eternal) spinner.
                                    statsEl.textContent = lastBadge + " · interrupted";
                                }
                                setRefiningUi(false);
                            },
                        });
                    }

                    document.getElementById("f-apply").addEventListener("click", () => {
                        // New filters invalidate the current scope; reset depth.
                        maxFiles = null;
                        updateBrowserUrl();
                        startStreaming();
                    });

                    document.getElementById("f-more").addEventListener("click", () => {
                        // Request deeper sampling for the current scope: raise the
                        // ceiling to ~4x the files folded so far, then reopen the
                        // stream. The server folds from where it left off (already-
                        // folded files are served instantly) up to the new cap.
                        const folded = lastCoverage ? lastCoverage.files_folded : 0;
                        maxFiles = nextMaxFiles(folded);
                        startStreaming();
                    });

                    stopBtn.addEventListener("click", () => {
                        // Manual stop: abort the stream, freeze at current coverage.
                        stopStreaming();
                        statsEl.textContent = lastBadge + " \u00b7 stopped";
                    });

                    // Build a COMPLETE scope query for the current view, from the
                    // live toolbar state plus the scope vars. Unlike the address
                    // bar (updateBrowserUrl, which drops bucket/prefix/max_files),
                    // this carries everything needed to re-fetch the aggregate.
                    // Credentials are never included.
                    function currentScopeQuery() {
                        const p = new URLSearchParams();
                        p.set("api", "1");
                        if (params.get("data_dir")) p.set("data_dir", params.get("data_dir"));
                        if (scopeBucket) p.set("bucket", scopeBucket);
                        if (scopeRegion) p.set("aws_region", scopeRegion);
                        if (scopePrefix) p.set("prefix", scopePrefix);
                        if (scopeService) p.set("service", scopeService);
                        for (const h of filterState.hosts) p.append("host", h);
                        // Send all non-empty facet filters (source, thread_class,
                        // spawn_location) — the live filterState is the source of
                        // truth, same as buildApiUrl.
                        for (const [k, v] of Object.entries(filterState)) {
                            if (k === "hosts" || !v) continue;
                            p.set(k, v);
                        }
                        const sNs = pickerUtcToNs(fStart.value);
                        const eNs = pickerUtcToNs(fEnd.value);
                        if (sNs) p.set("start_ns", sNs);
                        if (eNs) p.set("end_ns", eNs);
                        if (maxFiles != null) p.set("max_files", String(maxFiles));
                        return FlamegraphDiff.fullScopeQuery(p);
                    }

                    document.getElementById("f-copylink").addEventListener("click", async () => {
                        const url = window.location.origin + window.location.pathname +
                            "?" + currentScopeQuery().toString();
                        const btn = document.getElementById("f-copylink");
                        const orig = btn.textContent;
                        try {
                            await navigator.clipboard.writeText(url);
                            btn.textContent = "Copied!";
                        } catch (e) {
                            // Clipboard API unavailable (insecure context): fall
                            // back to a prompt so the user can copy manually. The
                            // prompt returns null if the user cancels — only
                            // claim success when they didn't.
                            const res = window.prompt("Copy this link:", url);
                            btn.textContent = res !== null ? "Copied!" : orig;
                        }
                        setTimeout(() => { btn.textContent = orig; }, 1500);
                    });

                    document.getElementById("f-adddiff").addEventListener("click", () => {
                        // Capture the current view (respecting the Host dropdown's
                        // selection — currentScopeQuery emits every filterState.hosts
                        // entry, so a narrowed dropdown gives a single-host side and
                        // "All" gives the full original host set) as one diff side.
                        diffCapture = FlamegraphDiff.addDiffCapture(diffCapture, currentScopeQuery());
                        renderDiffTray();
                    });

                    document.getElementById("f-diff").addEventListener("click", () => {
                        openDiffDialog(currentScopeQuery());
                    });

                    startStreaming();
                    window.addEventListener("resize", () => fg.resize());
                    window.addEventListener("keydown", (e) => { if (e.key === "Escape") fg.handleEscape(); });
                    return;
                }

                // Exact mode with a scope instead of inline trace= params:
                // re-list the scope's files (credentialed, same headers as the
                // trace fetch below) and load them through the same path.
                if (!traceUrls.length) {
                    const scope = Dial9TraceScope.readScope(params);
                    if (scope) {
                        try {
                            loadingEl.textContent = "Resolving trace selection…";
                            const fetchJson = async (u) => {
                                const h = window.Dial9Creds ? Dial9Creds.headers() : {};
                                const r = await fetch(u, { headers: h });
                                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                                return r.json();
                            };
                            traceUrls = await Dial9TraceScope.resolveScope(scope, fetchJson);
                        } catch (err) {
                            showError("Failed to resolve trace selection: " + err.message);
                            return;
                        }
                    }
                }

                if (!traceUrls.length) {
                    showError("No trace URL provided. Use ?trace=<url>&start=<ns>&end=<ns> or ?api=1&data_dir=...");
                    return;
                }

                // Load the trace. We STREAM whenever the runtime supports it
                // (single OR multiple URLs): download and decode overlap, hiding
                // most of the parse time behind the download. For multiple
                // components the fetches run concurrently and stream in
                // back-to-back as one trace, so parsing the first overlaps the
                // others' downloads (issue #595). Only when streaming is
                // unavailable do we fall back to the buffered fetch+concatenate
                // path (each component fetched and gunzipped independently, then
                // concatenated).
                const credHeaders = window.Dial9Creds ? Dial9Creds.headers() : {};
                let trace;
                try {
                    if (TraceParser.canStreamDecode()) {
                        loadingEl.textContent = traceUrls.length > 1
                            ? `Loading ${traceUrls.length} traces\u2026`
                            : "Loading trace\u2026";
                        const stream = traceUrls.length === 1
                            ? await TraceParser.fetchTraceStream(traceUrls[0], { headers: credHeaders })
                            : TraceParser.fetchTracesStream(traceUrls, { headers: credHeaders });
                        trace = await TraceParser.parseTraceStream(stream);
                    } else {
                        loadingEl.textContent = traceUrls.length > 1
                            ? `Fetching ${traceUrls.length} traces\u2026`
                            : "Fetching trace\u2026";
                        const buffer = await TraceParser.fetchTraces(traceUrls, { headers: credHeaders });
                        loadingEl.textContent = "Parsing trace\u2026";
                        trace = await TraceParser.parseTrace(buffer);
                    }
                } catch (err) {
                    if (/HTTP 401/.test(err.message) && window.Dial9Creds && !Dial9Creds.has()) {
                        showError(
                            "This trace requires AWS credentials. Open it from the dial9 " +
                            "home page after applying your credentials."
                        );
                    } else {
                        showError("Failed to load trace: " + err.message);
                    }
                    return;
                }

                // Process: build worker spans and attach CPU samples for spawnLoc
                try {
                    loadingEl.innerHTML = '<div class="spinner"></div>Analyzing\u2026';
                    const evts = trace.events;
                    const wSet = new Set();
                    const ET = TraceParser.EVENT_TYPES;
                    evts.forEach((e) => {
                        if (e.eventType !== ET.QueueSample && e.eventType !== ET.WakeEvent) wSet.add(e.workerId);
                    });
                    const workerIds = [...wSet].sort((a, b) => a - b);
                    const maxTs = evts.length > 0 ? evts[evts.length - 1].timestamp : 0;
                    const spanResult = TraceAnalysis.buildWorkerSpans(evts, workerIds, maxTs);
                    if (trace.cpuSamples.length > 0) {
                        TraceAnalysis.attachCpuSamples(trace.cpuSamples, spanResult.workerSpans);
                    }
                } catch (err) {
                    // Non-fatal: spawnLoc just won't be available
                    console.warn("Failed to attach spawn locations:", err);
                }

                // Filter to the selected time range, fall back to all samples if
                // the URL timestamps don't align with the parsed trace.
                let allSamples = FlamegraphRenderer.filterCpuSamples(trace.cpuSamples, startNs, endNs);
                let timeRangeMatched = allSamples.length > 0;
                if (!timeRangeMatched) {
                    const unfiltered = FlamegraphRenderer.filterCpuSamples(trace.cpuSamples, null, null);
                    if (unfiltered.length > 0 && (startNs != null || endNs != null)) {
                        allSamples = unfiltered;
                        console.warn("Time range filter matched 0 samples — showing all", unfiltered.length, "samples");
                    } else {
                        showError("No CPU samples found in the specified time range.");
                        return;
                    }
                }

                // Update title. Prefer the structured svc/host metadata passed
                // by the S3 browser; otherwise fall back to the trace filename.
                const svc = params.get("svc");
                const host = params.get("host");
                const segs = params.get("segs");
                const fromTime = params.get("from");
                const toTime = params.get("to");
                const label = svc
                    ? svc + (host ? ` @ ${host}` : "")
                    : (traceUrls[0].split("/").pop() || "trace");
                const durMs = startNs != null && endNs != null
                    ? ((endNs - startNs) / 1e6).toFixed(2)
                    : null;
                document.title = `Flamegraph \u2014 ${label}` + (durMs ? ` (${durMs}ms)` : "");
                titleEl.textContent = `Flamegraph \u2014 ${label}`;
                const titleBits = [`${allSamples.length} samples`];
                if (segs) titleBits.push(`${segs} segment${segs !== "1" ? "s" : ""}`);
                if (fromTime) titleBits.push(toTime && toTime !== fromTime ? `${fromTime} \u2192 ${toTime}` : fromTime);
                if (durMs) titleBits.push(`${durMs}ms selected`);
                if (!timeRangeMatched) titleBits.push("full trace \u2014 selected region could not be reproduced");
                statsEl.textContent = titleBits.join(" \u00b7 ");

                loadingEl.classList.add("hidden");
                containerEl.style.display = "flex";

                function updateUrlZoom() {
                    const p = new URLSearchParams(window.location.search);
                    const z = fg.getZoomPath();
                    if (z.worker.length > 0) p.set("worker-zoom", z.worker.join("\t"));
                    else p.delete("worker-zoom");
                    if (z.offworker.length > 0) p.set("offworker-zoom", z.offworker.join("\t"));
                    else p.delete("offworker-zoom");
                    const newUrl = window.location.pathname + "?" + p.toString();
                    window.history.replaceState(null, "", newUrl);
                }

                const fg = FlamegraphRenderer.createFlamegraph(containerEl, updateUrlZoom);
                fg.setData(allSamples, trace.callframeSymbols, {
                    exportTitle: `Flamegraph — ${label}`,
                    runtimeWorkers: trace.runtimeWorkers,
                });

                // Restore zoom from URL (only if time range filter succeeded, otherwise tree differs)
                if (timeRangeMatched) {
                    const wz = params.get("worker-zoom");
                    const oz = params.get("offworker-zoom");
                    if (wz) fg.zoomToPath("worker", wz.split("\t"));
                    if (oz) fg.zoomToPath("offworker", oz.split("\t"));
                }

                // Responsive resize
                window.addEventListener("resize", () => fg.resize());

                // Escape key
                window.addEventListener("keydown", (e) => {
                    if (e.key === "Escape") {
                        fg.handleEscape();
                    }
                });
            })();
        </script>
    </body>
</html>
