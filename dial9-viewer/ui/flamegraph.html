                        // view first, so re-applying over successive snapshots is
                        // idempotent. A genuine user interaction flips
                        // viewRestored via onApiViewChange, which stops us from
                        // ever snapping their view back to the URL.
                        if (!viewRestored) {
                            const want = ViewState.readState(params);
                            restoringView = true;
                            fg.applyViewState(want);
                            restoringView = false;
                            const z = fg.getZoomPath();
                            const zoomOk =
                                (!want.workerZoom || z.worker.join("\t") === want.workerZoom.join("\t")) &&
                                (!want.offworkerZoom || z.offworker.join("\t") === want.offworkerZoom.join("\t"));
                            const inspectOk = !want.inspect || fg.getInspectFocus() != null;
                            // Done once the link's focus is fully in place (or the
                            // link carried no focus at all). search/spawn/runtime
                            // apply synchronously, so zoom+inspect are the only
                            // pieces that can lag a streamed snapshot.
                            if (zoomOk && inspectOk) viewRestored = true;
                        }

                        const cov = resp.coverage;
                        lastCoverage = cov;
                        if (cov == null) {
                            // Local-dir / non-aggregation mode: no coverage badge.
                            lastBadge = baseStats(resp);
                        } else {
                            lastBadge = baseStats(resp) + " \u00b7 " + formatCoverageBadge(cov);
                        }
                        statsEl.innerHTML = lastBadge + ' \u00b7 <span class="spinner" style="width:0.9em;height:0.9em;display:inline-block;vertical-align:middle"></span> refining\u2026';

                        // Surface fold failures (e.g. unwritable output bucket) as a
                        // banner so a systematic failure isn't a silent empty tree.
                        const notice = foldErrorNotice(cov);
                        if (notice) {
                            foldWarnEl.textContent = notice;
                            foldWarnEl.style.display = "block";
                        } else {
                            foldWarnEl.style.display = "none";
                        }
                    }

                    // (Re)start the stream from scratch: aborts any in-flight
                    // stream and shows the loading overlay. The server emits the
                    // already-folded snapshot immediately, then refines to the cap.
                    //
                    // A scope change (new filters/facets/time/poll-band) resets the
                    // fast/slow split so it re-seeds to the incoming distribution's
                    // median. "Refine more" passes preserveSplit=true: it's the same
                    // scope with deeper sampling, so a user-chosen split must stick.
                    function startStreaming(preserveSplit = false) {
                        if (!preserveSplit) {
                            splitNs = null;
                            renderedHistKey = null; // force the marker to re-seed
                        }
                        stopStreaming();
                        setRefiningUi(true);
                        gotEvent = false;
                        loadingEl.classList.remove("hidden");
                        loadingEl.innerHTML = '<div class="spinner"></div>Loading aggregated flamegraph\u2026';
                        containerEl.style.display = "none";
                        errorEl.style.display = "none";
                        foldWarnEl.style.display = "none";
                        const token = ++streamToken;
                        abortCtl = new AbortController();
                        const credHeaders = window.Dial9Creds ? Dial9Creds.headers() : {};
                        Dial9Sse.openSse(buildApiUrl(), {
                            headers: credHeaders,
                            signal: abortCtl.signal,
                            onEvent: (resp) => { if (token === streamToken) renderEvent(resp); },
                            onClose: () => {
                                if (token !== streamToken) return;
                                // Server folded to the cap and closed the stream.
                                statsEl.textContent = lastBadge + (gotEvent ? " \u00b7 refined" : "");
                                setRefiningUi(false);
                            },
                            onError: (err) => {
                                if (token !== streamToken) return;
                                if (!gotEvent) {
                                    showError("Failed to load flamegraph: " + err.message);
                                } else {
                                    // Mid-stream drop: keep the rendered tree but
                                    // clear the (would-be-eternal) spinner.
                                    statsEl.textContent = lastBadge + " · interrupted";
                                }
                                setRefiningUi(false);
                            },
                        });
                    }

                    document.getElementById("f-apply").addEventListener("click", () => {
                        // New filters invalidate the current scope; reset depth.
                        maxFiles = null;
                        updateBrowserUrl();
                        startStreaming();
                    });

                    document.getElementById("f-more").addEventListener("click", () => {
                        // Request deeper sampling for the current scope: raise the
                        // ceiling to ~4x the files folded so far, then reopen the
                        // stream. The server folds from where it left off (already-
                        // folded files are served instantly) up to the new cap.
                        const folded = lastCoverage ? lastCoverage.files_folded : 0;
                        maxFiles = nextMaxFiles(folded);
                        startStreaming(true); // same scope → keep the chosen split
                    });

                    stopBtn.addEventListener("click", () => {
                        // Manual stop: abort the stream, freeze at current coverage.
                        stopStreaming();
                        statsEl.textContent = lastBadge + " \u00b7 stopped";
                    });

                    // Build a COMPLETE scope query for the current view, from the
                    // live toolbar state plus the scope vars. Unlike the address
                    // bar (updateBrowserUrl, which drops bucket/prefix/max_files),
                    // this carries everything needed to re-fetch the aggregate.
                    // Credentials are never included.
                    function currentScopeQuery() {
                        const p = new URLSearchParams();
                        p.set("api", "1");
                        if (params.get("data_dir")) p.set("data_dir", params.get("data_dir"));
                        if (scopeBucket) p.set("bucket", scopeBucket);
                        if (scopeRegion) p.set("aws_region", scopeRegion);
                        if (scopePrefix) p.set("prefix", scopePrefix);
                        if (scopeService) p.set("service", scopeService);
                        for (const h of filterState.hosts) p.append("host", h);
                        // Send all non-empty facet filters (source, thread_class,
                        // spawn_location) — the live filterState is the source of
                        // truth, same as buildApiUrl.
                        for (const [k, v] of Object.entries(filterState)) {
                            if (k === "hosts" || !v) continue;
                            p.set(k, v);
                        }
                        const sNs = pickerUtcToNs(fStart.value);
                        const eNs = pickerUtcToNs(fEnd.value);
                        if (sNs) p.set("start_ns", sNs);
                        if (eNs) p.set("end_ns", eNs);
                        const minPollNs = msToNs(fPollMin.value);
                        const maxPollNs = msToNs(fPollMax.value);
                        if (minPollNs) p.set("min_poll_ns", minPollNs);
                        if (maxPollNs) p.set("max_poll_ns", maxPollNs);
                        if (maxFiles != null) p.set("max_files", String(maxFiles));
                        return FlamegraphDiff.fullScopeQuery(p);
                    }

                    document.getElementById("f-copylink").addEventListener("click", async () => {
                        // The Copy link carries the full scope PLUS the live
                        // zoom/inspect focus, so a coworker opening it lands on the
                        // exact same focus position. (currentScopeQuery stays
                        // focus-free so diff captures compare scopes, not views.)
                        const q = currentScopeQuery();
                        writeViewState(q, fg);
                        const url = window.location.origin + window.location.pathname +
                            "?" + q.toString();
                        const btn = document.getElementById("f-copylink");
                        const orig = btn.textContent;
                        try {
                            await navigator.clipboard.writeText(url);
                            btn.textContent = "Copied!";
                        } catch (e) {
                            // Clipboard API unavailable (insecure context): fall
                            // back to a prompt so the user can copy manually. The
                            // prompt returns null if the user cancels — only
                            // claim success when they didn't.
                            const res = window.prompt("Copy this link:", url);
                            btn.textContent = res !== null ? "Copied!" : orig;
                        }
                        setTimeout(() => { btn.textContent = orig; }, 1500);
                    });

                    document.getElementById("f-adddiff").addEventListener("click", () => {
                        // Capture the current view (respecting the Host dropdown's
                        // selection — currentScopeQuery emits every filterState.hosts
                        // entry, so a narrowed dropdown gives a single-host side and
                        // "All" gives the full original host set) as one diff side.
                        diffCapture = FlamegraphDiff.addDiffCapture(diffCapture, currentScopeQuery());
                        renderDiffTray();
                    });

                    document.getElementById("f-diff").addEventListener("click", () => {
                        openDiffDialog(currentScopeQuery());
                    });

                    startStreaming();
                    window.addEventListener("resize", () => fg.resize());
                    window.addEventListener("keydown", (e) => { if (e.key === "Escape") fg.handleEscape(); });
                    return;
                }

                // Exact mode with a scope instead of inline trace= params:
                // re-list the scope's files (credentialed, same headers as the
                // trace fetch below) and load them through the same path.
                if (!traceUrls.length) {
                    const scope = Dial9TraceScope.readScope(params);
                    if (scope) {
                        try {
                            loadingEl.textContent = "Resolving trace selection…";
                            const fetchJson = async (u) => {
                                const h = window.Dial9Creds ? Dial9Creds.headers() : {};
                                const r = await fetch(u, { headers: h });
                                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                                return r.json();
                            };
                            traceUrls = await Dial9TraceScope.resolveScope(scope, fetchJson);
                        } catch (err) {
                            showError("Failed to resolve trace selection: " + err.message);
                            return;
                        }
                    }
                }

                if (!traceUrls.length) {
                    showError("No trace URL provided. Use ?trace=<url>&start=<ns>&end=<ns> or ?api=1&data_dir=...");
                    return;
                }

                // Load the trace. We STREAM whenever the runtime supports it
                // (single OR multiple URLs): download and decode overlap, hiding
                // most of the parse time behind the download. For multiple
                // components the fetches run concurrently and stream in
                // back-to-back as one trace, so parsing the first overlaps the
                // others' downloads (issue #595). Only when streaming is
                // unavailable do we fall back to the buffered fetch+concatenate
                // path (each component fetched and gunzipped independently, then
                // concatenated).
                const credHeaders = window.Dial9Creds ? Dial9Creds.headers() : {};
                let trace;
                try {
                    if (TraceParser.canStreamDecode()) {
                        loadingEl.textContent = traceUrls.length > 1
                            ? `Loading ${traceUrls.length} traces\u2026`
                            : "Loading trace\u2026";
                        const stream = traceUrls.length === 1
                            ? await TraceParser.fetchTraceStream(traceUrls[0], { headers: credHeaders })
                            : TraceParser.fetchTracesStream(traceUrls, { headers: credHeaders });
                        trace = await TraceParser.parseTraceStream(stream);
                    } else {
                        loadingEl.textContent = traceUrls.length > 1
                            ? `Fetching ${traceUrls.length} traces\u2026`
                            : "Fetching trace\u2026";
                        const buffer = await TraceParser.fetchTraces(traceUrls, { headers: credHeaders });
                        loadingEl.textContent = "Parsing trace\u2026";
                        trace = await TraceParser.parseTrace(buffer);
                    }
                } catch (err) {
                    if (/HTTP 401/.test(err.message) && window.Dial9Creds && !Dial9Creds.has()) {
                        showError(
                            "This trace requires AWS credentials. Open it from the dial9 " +
                            "home page after applying your credentials."
                        );
                    } else {
                        showError("Failed to load trace: " + err.message);
                    }
                    return;
                }

                // Process: build worker spans and attach CPU samples for spawnLoc
                try {
                    loadingEl.innerHTML = '<div class="spinner"></div>Analyzing\u2026';
                    const evts = trace.events;
                    const wSet = new Set();
                    const ET = TraceParser.EVENT_TYPES;
                    evts.forEach((e) => {
                        if (e.eventType !== ET.QueueSample && e.eventType !== ET.WakeEvent) wSet.add(e.workerId);
                    });
                    const workerIds = [...wSet].sort((a, b) => a - b);
                    const maxTs = evts.length > 0 ? evts[evts.length - 1].timestamp : 0;
                    const spanResult = TraceAnalysis.buildWorkerSpans(evts, workerIds, maxTs);
                    if (trace.cpuSamples.length > 0) {
                        TraceAnalysis.attachCpuSamples(trace.cpuSamples, spanResult.workerSpans);
                    }
                } catch (err) {
                    // Non-fatal: spawnLoc just won't be available
                    console.warn("Failed to attach spawn locations:", err);
                }

                // Filter to the selected time range, fall back to all samples if
                // the URL timestamps don't align with the parsed trace.
                let allSamples = FlamegraphRenderer.filterCpuSamples(trace.cpuSamples, startNs, endNs);
                let timeRangeMatched = allSamples.length > 0;
                if (!timeRangeMatched) {
                    const unfiltered = FlamegraphRenderer.filterCpuSamples(trace.cpuSamples, null, null);
                    if (unfiltered.length > 0 && (startNs != null || endNs != null)) {
                        allSamples = unfiltered;
                        console.warn("Time range filter matched 0 samples — showing all", unfiltered.length, "samples");
                    } else {
                        showError("No CPU samples found in the specified time range.");
                        return;
                    }
                }

                // Update title. Prefer the structured svc/host metadata passed
                // by the S3 browser; otherwise fall back to the trace filename.
                const svc = params.get("svc");
                const host = params.get("host");
                const segs = params.get("segs");
                const fromTime = params.get("from");
                const toTime = params.get("to");
                const label = svc
                    ? svc + (host ? ` @ ${host}` : "")
                    : (traceUrls[0].split("/").pop() || "trace");
                const durMs = startNs != null && endNs != null
                    ? ((endNs - startNs) / 1e6).toFixed(2)
                    : null;
                document.title = `Flamegraph \u2014 ${label}` + (durMs ? ` (${durMs}ms)` : "");
                titleEl.textContent = `Flamegraph \u2014 ${label}`;
                const titleBits = [`${allSamples.length} samples`];
                if (segs) titleBits.push(`${segs} segment${segs !== "1" ? "s" : ""}`);
                if (fromTime) titleBits.push(toTime && toTime !== fromTime ? `${fromTime} \u2192 ${toTime}` : fromTime);
                if (durMs) titleBits.push(`${durMs}ms selected`);
                if (!timeRangeMatched) titleBits.push("full trace \u2014 selected region could not be reproduced");
                statsEl.textContent = titleBits.join(" \u00b7 ");

                loadingEl.classList.add("hidden");
                containerEl.style.display = "flex";

                function updateUrlZoom() {
                    const p = writeViewState(new URLSearchParams(window.location.search), fg);
                    const newUrl = window.location.pathname + "?" + p.toString();
                    window.history.replaceState(null, "", newUrl);
                }

                const fg = FlamegraphRenderer.createFlamegraph(containerEl, updateUrlZoom);
                fg.setData(allSamples, trace.callframeSymbols, {
                    exportTitle: `Flamegraph — ${label}`,
                    runtimeWorkers: trace.runtimeWorkers,
                });

                // Restore zoom + inspect focus from URL (only if time range filter
                // succeeded, otherwise the tree differs and the path won't match)
                if (timeRangeMatched) {
                    restoreViewState(fg, params);
                }

                // Responsive resize
                window.addEventListener("resize", () => fg.resize());

                // Escape key
                window.addEventListener("keydown", (e) => {
                    if (e.key === "Escape") {
                        fg.handleEscape();
                    }
                });
            })();
        </script>
    </body>
</html>
